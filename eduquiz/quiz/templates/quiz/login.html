{% extends 'quiz/base.html' %}

{% block content %}
<div class="form-card">
    <h2>Connexion</h2>
    <form method="post">
        {% csrf_token %}
        <div class="field-group">
            {{ form.username.label_tag }}
            {{ form.username }}
        </div>
        <div class="field-group">
            {{ form.password.label_tag }}
            {{ form.password }}
        </div>
        <input type="submit" class="button" value="Se connecter" />
    </form>
</div>
{% endblock %}
